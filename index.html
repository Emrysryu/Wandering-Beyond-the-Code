<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Wandering Beyond the Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #4a7fa5;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Wandering Beyond the Code',
      repo: 'https://github.com/Emrysryu/Wandering-Beyond-the-Code',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '搜索',
        noData: '没有结果',
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            var counter = document.getElementById('busuanzi-counter');
            if (!counter) {
              counter = document.createElement('div');
              counter.id = 'busuanzi-counter';
              counter.style.cssText = 'text-align:right;font-size:0.85em;color:#999;margin-top:2em;padding-top:1em;border-top:1px solid #eee;';
              document.querySelector('article') && document.querySelector('article').appendChild(counter);
            }
            counter.innerHTML = '本文阅读量 <span id="busuanzi_value_page_pv">...</span> 次';
          });
        }
      ],
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
